<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d1117;
      color: white;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #161b22;
      padding: 32px;
      border-radius: 12px;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      margin-top: 0;
      text-align: center;
      margin-bottom: 24px;
      font-weight: 600;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      margin-bottom: 16px;
      background: #0d1117;
      color: white;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .error {
      color: #ff6b6b;
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Iniciar sesión</h2>

    <label for="user">Usuario</label>
    <input id="user" type="text" autocomplete="username">

    <label for="pass">Contraseña</label>
    <input id="pass" type="password" autocomplete="current-password">

    <button id="btn-login">Ingresar</button>

    <div id="login-error" class="error">Credenciales inválidas</div>
  </div>

  <script src="app_core_v5.js"></script>
  <script src="ui_engine_v5.js"></script>

  <script>
    const btn = document.getElementById("btn-login");
    const err = document.getElementById("login-error");

    btn.addEventListener("click", async () => {
      const user = document.getElementById("user").value.trim();
      const pass = document.getElementById("pass").value.trim();

      err.style.display = "none";

      if (!user || !pass) {
        err.textContent = "Complete usuario y contraseña";
        err.style.display = "block";
        return;
      }

      const r = await appCore.login(user, pass);

      if (!r.ok) {
        err.textContent = "Credenciales inválidas";
        err.style.display = "block";
        return;
      }

      window.location.href = "index.html";
    });
  </script>

</body>
</html>
